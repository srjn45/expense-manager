# Test/local development environment for Expense Manager.
# Start: docker compose up -d
# Stop:  docker compose down
#
# Frontend is exposed on port 80; API is not exposed (nginx in frontend proxies /api to api service).

services:
  postgres:
    image: postgres:16-alpine
    container_name: expense-manager-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: expense_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/docker/postgres-init.sh:/docker-entrypoint-initdb.d/postgres-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d expense_manager"]
      interval: 2s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: expense-manager-api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/expense_manager
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: expense-manager-frontend
    ports:
      - "80:80"
    environment:
      API_BACKEND_URL: http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
