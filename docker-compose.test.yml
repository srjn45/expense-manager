# Test environment: PostgreSQL only (ephemeral — no volume; data is lost on down).
# Uses host port 5433 so it can run alongside persistent Postgres (docker-compose.postgres.yml on 5432).
# Start: docker compose -f docker-compose.test.yml up -d
# Stop:  docker compose -f docker-compose.test.yml down

services:
  postgres:
    image: postgres:16-alpine
    container_name: expense-manager-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: expense_manager
    ports:
      - "5433:5432"
    volumes:
      - ./apps/api/docker/postgres-init.sh:/docker-entrypoint-initdb.d/postgres-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d expense_manager"]
      interval: 2s
      timeout: 5s
      retries: 5
